version: '3'

vars:
  BINARY: ccws
  PKG: ./cmd/ccws

tasks:
  default:
    desc: Run tests (default)
    cmds:
      - task: test

  build:
    desc: Build the ccws binary to repo root
    cmds:
      - go build -o {{.BINARY}} {{.PKG}}
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - '{{.BINARY}}'

  install:
    desc: Install ccws to $GOBIN (or $GOPATH/bin)
    cmds:
      - go install {{.PKG}}

  run:
    desc: 'Run ccws (pass args after --, e.g. `task run -- --color red /tmp/foo`)'
    cmds:
      - go run {{.PKG}} {{.CLI_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:race:
    desc: Run all tests with race detector
    cmds:
      - go test -race -count=1 ./...

  test:cover:
    desc: Run tests with coverage summary
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format Go code (gofmt -s)
    cmds:
      - gofmt -w -s .

  fmt:check:
    desc: Fail if any files are not gofmt'd
    cmds:
      - test -z "$(gofmt -l .)"

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  lint:
    desc: Run vet + gofmt check
    cmds:
      - task: vet
      - task: fmt:check

  fixture:
    desc: Regenerate Peacock golden fixture from JS reference
    dir: scripts/gen-peacock-fixture
    cmds:
      - npm install --silent --no-audit --no-fund
      - node main.js > ../../internal/color/testdata/fixture.json

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}} coverage.out

  ci:
    desc: CI pipeline (lint + race tests)
    cmds:
      - task: lint
      - task: test:race
