version: '3'

vars:
  BINARY: ccws
  PKG: ./cmd/ccws
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  LDFLAGS: -X main.version={{.VERSION}}

tasks:
  default:
    desc: Run tests (default)
    cmds:
      - task: test

  build:
    desc: Build the ccws binary to ./bin/
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY}} {{.PKG}}
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - 'bin/{{.BINARY}}'

  install:
    desc: Install ccws to $GOBIN (or $GOPATH/bin)
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" {{.PKG}}

  run:
    desc: 'Run ccws (pass args after --, e.g. `task run -- --color red /tmp/foo`)'
    cmds:
      - go run {{.PKG}} {{.CLI_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:race:
    desc: Run all tests with race detector
    cmds:
      - go test -race -count=1 ./...

  test:cover:
    desc: Run tests with coverage summary
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  test:integration:
    desc: Run integration tests (requires git on PATH)
    cmds:
      - go test -tags=integration -count=1 ./...

  fmt:
    desc: Format Go code (gofmt -s + goimports via golangci-lint)
    cmds:
      - go tool golangci-lint fmt

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  lint:
    desc: Run golangci-lint (linters + format check)
    cmds:
      - go tool golangci-lint run
      - go tool golangci-lint fmt --diff

  fixture:
    desc: Regenerate Peacock golden fixture from JS reference
    dir: scripts/gen-peacock-fixture
    cmds:
      - npm install --silent --no-audit --no-fund
      - node main.js > ../../internal/color/testdata/fixture.json

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ coverage.out

  ci:
    desc: CI pipeline (lint + race tests)
    cmds:
      - task: lint
      - task: test:race
